ktor {
    deployment {
        port = 0
    }
    application {
        modules = [com.timothymarias.familyarchive.ApplicationKt.module]
    }
    development = true
}

database {
    url = ${TEST_DB_URL}
    user = ${TEST_DB_USER}
    password = ${TEST_DB_PASSWORD}
    maxPoolSize = 5
}

storage {
    type = "local"
    local {
        uploadDir = "build/test-uploads"
    }
    s3 {
        bucket = ""
        region = ""
        accessKey = ""
        secretKey = ""
        cloudFrontDomain = ""
        publicBucket = false
    }
}

jobrunr {
    enabled = false
}

app {
    seeding {
        enabled = false
    }
    tinymceApiKey = "test-key"
    maxFileSize = 52428800
}

cors {
    allowedOrigins = ["http://localhost:5173"]
}

session {
    secretEncryptKey = "00112233445566778899aabbccddeeff"
    secretSignKey = "6819b57a326945c1968f45236589"
}
