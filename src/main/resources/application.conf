ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.timothymarias.familyarchive.ApplicationKt.module]
    }
    development = false
    development = ${?KTOR_DEVELOPMENT}
}

database {
    url = "jdbc:postgresql://localhost:5432/familyarchive"
    url = ${?DATABASE_URL}
    user = "familyarchive"
    user = ${?DATABASE_USER}
    password = "familyarchive"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

storage {
    type = "local"
    type = ${?STORAGE_TYPE}

    local {
        uploadDir = "uploads"
        uploadDir = ${?STORAGE_LOCAL_UPLOAD_DIR}
    }

    s3 {
        bucket = ""
        bucket = ${?AWS_S3_BUCKET_NAME}
        region = ""
        region = ${?AWS_S3_REGION}
        accessKey = ""
        accessKey = ${?AWS_S3_ACCESS_KEY}
        secretKey = ""
        secretKey = ${?AWS_S3_SECRET_KEY}
        cloudFrontDomain = ""
        cloudFrontDomain = ${?AWS_CLOUDFRONT_DOMAIN}
        publicBucket = false
        publicBucket = ${?AWS_S3_PUBLIC_BUCKET}
    }
}

jobrunr {
    enabled = true
    enabled = ${?JOBRUNR_ENABLED}
    workerCount = 4
    workerCount = ${?JOBRUNR_WORKER_COUNT}
    pollIntervalSeconds = 5
    dashboard {
        enabled = true
        enabled = ${?JOBRUNR_DASHBOARD_ENABLED}
        port = 8000
        port = ${?JOBRUNR_DASHBOARD_PORT}
        username = "admin"
        username = ${?JOBRUNR_DASHBOARD_USERNAME}
        password = "admin"
        password = ${?JOBRUNR_DASHBOARD_PASSWORD}
    }
}

app {
    seeding {
        enabled = false
        enabled = ${?APP_SEEDING_ENABLED}
    }
    tinymceApiKey = "no-api-key"
    tinymceApiKey = ${?TINYMCE_API_KEY}
    maxFileSize = 52428800  # 50MB in bytes
}

cors {
    allowedOrigins = ["http://localhost:5173", "http://127.0.0.1:5173"]
    allowedOrigins = ${?CORS_ALLOWED_ORIGINS}
}

session {
    secretEncryptKey = "00112233445566778899aabbccddeeff"
    secretEncryptKey = ${?SESSION_ENCRYPT_KEY}
    secretSignKey = "6819b57a326945c1968f45236589"
    secretSignKey = ${?SESSION_SIGN_KEY}
}
