services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_DB=familyarchive'
      - 'POSTGRES_PASSWORD=familyarchive'
      - 'POSTGRES_USER=familyarchive'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U familyarchive']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '8080:8080'
      - '8000:8000' # JobRunr dashboard
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/familyarchive
      - DATABASE_USER=familyarchive
      - DATABASE_PASSWORD=familyarchive
      - JOBRUNR_DASHBOARD_USERNAME=${JOBRUNR_DASHBOARD_USERNAME:-admin}
      - JOBRUNR_DASHBOARD_PASSWORD=${JOBRUNR_DASHBOARD_PASSWORD:-admin}
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
